{% extends "genealogy/createusers/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="cu-card cu-form-card">
  <h1>{{ title }}</h1>
  <form method="post" enctype="multipart/form-data" class="cu-form-grid">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <label class="cu-field">
        <span>{{ field.label }}</span>
        {{ field }}
        {% if field.errors %}<small class="cu-error">{{ field.errors|join:", " }}</small>{% endif %}
      </label>
    {% endfor %}
    <div class="cu-actions">
      <button class="cu-btn cu-btn-primary" type="submit">Saqlash</button>
      {% if person %}<a class="cu-btn" href="{% url 'genealogy:createusers-person-detail' person.id %}">Bekor qilish</a>{% else %}<a class="cu-btn" href="{% url 'genealogy:createusers-dashboard' %}">Bekor qilish</a>{% endif %}
    </div>
  </form>
</section>
{% endblock %}
