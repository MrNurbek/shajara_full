{% load static %}
<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CreateUsers{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'genealogy/css/createusers.css' %}">
</head>
<body>
  <header class="cu-topbar">
    <a class="cu-brand" href="{% url 'genealogy:createusers-dashboard' %}">CreateUsers</a>
    <nav class="cu-nav">
      <a href="{% url 'genealogy:createusers-dashboard' %}">Shajara jadvali</a>
      <a href="{% url 'genealogy:createusers-person-create' %}">Yangi shaxs</a>
      <a href="{% url 'genealogy:tree' %}" target="_blank">Shajarani ko‘rish</a>
      <a href="{% url 'genealogy:createusers-logout' %}">Chiqish</a>
    </nav>
  </header>

  <main class="cu-shell">
    {% if messages %}
      <section class="cu-messages">
        {% for message in messages %}<div class="cu-message cu-{{ message.tags }}">{{ message }}</div>{% endfor %}
      </section>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
