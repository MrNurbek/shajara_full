{% extends "genealogy/createusers/base.html" %}
{% block title %}Er/xotin qo‘shish{% endblock %}
{% block content %}
<section class="cu-card cu-form-card">
  <h1>{{ person.display_name }} uchun er/xotin qo‘shish</h1>
  <form method="post" class="cu-form-grid">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <label class="cu-field">
        <span>{{ field.label }}</span>
        {{ field }}
        {% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
        {% if field.errors %}<small class="cu-error">{{ field.errors|join:", " }}</small>{% endif %}
      </label>
    {% endfor %}
    <div class="cu-actions">
      <button class="cu-btn cu-btn-primary" type="submit">Bog‘lash</button>
      <a class="cu-btn" href="{% url 'genealogy:createusers-person-detail' person.id %}">Bekor qilish</a>
    </div>
  </form>
</section>
{% endblock %}
